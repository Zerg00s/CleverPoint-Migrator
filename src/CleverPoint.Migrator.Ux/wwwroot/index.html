<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CleverPoint Migrator</title>
    <base href="/" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link href="_content/Microsoft.FluentUI.AspNetCore.Components/css/reboot.css" rel="stylesheet" />
    <link href="app.css" rel="stylesheet" />
    <!-- Scoped-CSS bundle: REQUIRED for Blazor-rendered Fluent components (DataGrid, Dialog, Toast). -->
    <link href="CleverPoint.Migrator.Ux.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <div class="app-loading">
            <div class="app-loading-spinner"></div>
            <div class="app-loading-text">Loading CleverPoint Migrator…</div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <!-- Fluent UI web-component initializers (must load BEFORE blazor.webview.js in a WebView). -->
    <script app-name="CleverPoint.Migrator.Ux"
            src="./_content/Microsoft.FluentUI.AspNetCore.Components/js/initializersLoader.webview.js"></script>
    <script src="_framework/blazor.webview.js"></script>
    <!-- Freezes resizable grid columns to pixels on render to kill the first-drag jump. -->
    <script src="cp-grid.js"></script>
</body>

</html>
